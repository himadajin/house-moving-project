name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PANDOC_VERSION: "3.9"
    steps:
      - uses: actions/checkout@v4

      - name: Cache pandoc
        id: cache-pandoc
        uses: actions/cache@v4
        with:
          path: |
            /usr/bin/pandoc
            /usr/share/pandoc
          key: pandoc-${{ env.PANDOC_VERSION }}-${{ runner.os }}

      - name: Install pandoc
        if: steps.cache-pandoc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o pandoc.deb
          sudo dpkg -i pandoc.deb

      - name: Build
        run: make

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
